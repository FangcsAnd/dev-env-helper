<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw 一键安装</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">🦞</div>
        <h1>OpenClaw 一键安装</h1>
        <p class="subtitle">10 分钟快速部署 OpenClaw 开发环境</p>
      </header>

      <main>
        <div class="steps">
          <div class="step" data-step="1">
            <div class="step-num">1</div>
            <div class="step-content">
              <h3>一键安装</h3>
              <p>安装 Node.js + 下载 OpenClaw + 启动网关</p>
            </div>
            <button class="step-btn primary" data-action="install">开始安装</button>
          </div>
        </div>

        <div class="card api-key-card">
          <h2>🔑 API Key 配置</h2>
          <div class="api-key-form">
            <select id="quick-provider">
              <option value="deepseek">DeepSeek</option>
              <option value="kimi">Kimi (月之暗面)</option>
              <option value="siliconflow">SiliconFlow</option>
              <option value="anthropic">Anthropic (Claude)</option>
              <option value="openai">OpenAI</option>
              <option value="groq">Groq</option>
              <option value="gemini">Google Gemini</option>
              <option value="zhipu">智谱 GLM</option>
              <option value="qwen">阿里 通义千问</option>
              <option value="baidu">百度 文心一言</option>
              <option value="minimax">MiniMax</option>
              <option value="ollama">Ollama (本地)</option>
              <option value="cloudflare">Cloudflare AI</option>
              <option value="custom">自定义</option>
            </select>
            <input type="password" id="quick-api-key" placeholder="输入 API Key" />
            <button class="step-btn primary" id="quick-save-btn">保存并重启</button>
          </div>
        </div>

        <div class="card log-card">
          <h2>📋 安装日志</h2>
          <pre id="install-log">等待执行...</pre>
        </div>
      </main>

      <footer>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span id="progress-text">0%</span>
        </div>
      </footer>
    </div>

    <div class="loading-overlay" id="loading-overlay">
      <div>
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">安装中...</div>
      </div>
    </div>
  </body>
</html>
